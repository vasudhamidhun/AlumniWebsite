{% extends 'base.html' %}

{% block title %}Create Fundraising{% endblock %}

{% block content %}

<style>
/* Push content below fixed navbar */
.main-content {
    margin-top: 90px; /* navbar height + spacing */
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    background: #f3f2ef;
    min-height: 100vh;
}

/* Card container */
.fund-card {
    width: 100%;
    max-width: 650px;
    background: #ffffff;
    padding: 35px 40px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

/* Title */
.fund-card h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #0a66c2;
    font-weight: 600;
}

/* Form spacing */
.fund-card p {
    margin-bottom: 18px;
}

/* Labels */
.fund-card label {
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
    color: #333;
}

/* Inputs */
.fund-card input,
.fund-card textarea,
.fund-card select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
    transition: all 0.2s ease;
}

/* Focus effect */
.fund-card input:focus,
.fund-card textarea:focus,
.fund-card select:focus {
    border-color: #0a66c2;
    outline: none;
    box-shadow: 0 0 0 2px rgba(10,102,194,0.1);
}

/* Textarea resize */
.fund-card textarea {
    resize: vertical;
}

/* Submit button */
.fund-card button {
    width: 100%;
    padding: 12px;
    background: #0a66c2;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s ease;
    margin-top: 10px;
}

.fund-card button:hover {
    background: #004182;
}

/* Messages */
.messages {
    background: #e6f4ea;
    border-left: 5px solid #28a745;
    padding: 12px;
    margin-bottom: 20px;
    border-radius: 6px;
    color: #1e4620;
    font-weight: 500;
}

/* Responsive */
@media (max-width: 768px) {
    .fund-card {
        padding: 25px;
    }
}
</style>

<div class="main-content">
    <div class="fund-card">
        <h2>Create Fundraising Campaign</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="messages">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Submit Campaign</button>
        </form>
    </div>
</div>

{% endblock %}
