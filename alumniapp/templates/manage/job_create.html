<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Job Vacancy</title>

    <!-- Google Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
     body {
    padding-top: 80px;
     height: 100%;
    overflow-y: auto;
}

.page-wrapper {
    margin-left: 260px; /* only if admin sidebar */
    padding: 20px;
     min-height: calc(100vh - 80px);
    overflow-y: auto;
}

        /* ===== Form Card ===== */
        .job-card {
            background: #fff;
            width: 100%;
            max-width: 650px;
            border-radius: 10px;
            padding: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,.12);
             max-height: 80vh;
    overflow-y: auto;
        }

        .job-card h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
            color: #222;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }

        /* ===== Django Form Styling ===== */
        form p {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            background: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #0a66c2;
        }

        /* ===== Buttons ===== */
        .btn-submit {
            margin-top: 20px;
            background: #0a66c2;
            color: #fff;
            padding: 10px 18px;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-submit:hover {
            background: #004182;
        }

        .view-jobs {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #0a66c2;
            font-size: 14px;
            font-weight: 600;
        }

        .view-jobs:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- ================= ADMIN SIDEBAR ================= -->
{% if role %}
    {% include 'partials/navbar.html' %}

{% else %}
   {% include 'partials/adminsidebar.html' %}
{% endif %}

<!-- ===== PAGE CONTENT ===== -->
<div class="page-wrapper">
    <div class="job-card">
        <h2>Create Job Vacancy</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn-submit">
                Post Job
            </button>
        </form>

        <a href="{% url 'jobs_from_following' %}" class="view-jobs">
            ← View All Jobs
        </a>
    </div>
</div>

</body>
</html>
