<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Create Student Profile</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            padding: 40px;
        }

        .profile-container {
            max-width: 650px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        h3 {
            margin-top: 25px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }

        label {
            font-weight: bold;
            margin-top: 12px;
            display: block;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        .form-actions {
            margin-top: 25px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="profile-container">
    <h1>Create Student Profile</h1>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <h3>Personal Information</h3>
        <label>First Name</label>
        {{ form.first_name }}

        <label>Last Name</label>
        {{ form.last_name }}

        <label>Profile Photo</label>
        {{ form.profile_photo }}

        <label>Bio</label>
        {{ form.bio }}

        <h3>Academic Information</h3>
        <label>Degree</label>
        {{ form.degree }}

        <label>Branch</label>
        {{ form.branch }}

        <label>Batch Year</label>
        {{ form.batch_year }}

        <label>Interests</label>
        {{ form.interests }}

        <div class="form-actions">
            <button type="submit">Save Profile</button>
        </div>
    </form>
</div>

</body>
</html>
