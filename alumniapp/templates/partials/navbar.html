<!-- ================= NAVBAR ================= -->
<style>
/* ================= HEADER ================= */
.header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 64px;
    background: #ffffff;
    box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    z-index: 1000;
    display: flex;
    justify-content: center;
}

.header-inner {
    width: 100%;
    max-width: 1100px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
}

/* Logo */
.logo img {
    height: 45px;
    width: 45px;
    border-radius: 50%;
    object-fit: cover;
}

/* Center section */
.header-center {
    display: flex;
    align-items: center;
    gap: 30px;
}

/* Search */
.search-box input {
    width: 240px;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    background: #eef3f8;
    font-size: 14px;
}

/* Nav icons */
.nav-icons {
    display: flex;
    align-items: center;
    gap: 20px;
}

.nav-item {
    text-decoration: none;
    color: #555;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 70px;
    position: relative;
    transition: color 0.3s;
}

.nav-item span {
    font-size: 24px;
}

.nav-item:hover {
    color: #0a66c2;
}

/* Notification badge */
.notification-badge {
    position: absolute;
    top: 0;
    right: 18px;
    background: #e0245e;
    color: #fff;
    font-size: 10px;
    font-weight: bold;
    min-width: 16px;
    height: 16px;
    line-height: 16px;
    text-align: center;
    border-radius: 50%;
}

/* Profile */
.header-right a {
    color: #555;
    text-decoration: none;
}

.header-right span {
    font-size: 28px;
}
</style>

<div class="header">
  <div class="header-inner">

    <!-- Logo -->
    <div class="logo">
      <a href="{% url 'dashboard' %}">
        <img src="/media/logo/WhatsApp Image 2026-01-14 at 10.34.07 AM.jpeg" alt="Linked Alumni">
    </a>
    </div>

    <!-- Center -->
    <div class="header-center">

      <form method="GET" action="{% url 'alumni_search' %}" class="search-box">
        <input type="text" name="q" placeholder="Search alumni, jobs">
      </form>

      <div class="nav-icons">

        <a href="{% url 'dashboard' %}" class="nav-item">
          <span class="material-icons">home</span>
          Home
        </a>

        <a href="{% url 'friends_list' %}" class="nav-item">
          <span class="material-icons">group</span>
          Network
        </a>

        <a href="{% url 'jobs_from_following' %}" class="nav-item">
          <span class="material-icons">work</span>
          Jobs
        </a>

        <a href="{% url 'messages_dashboard' %}" class="nav-item">
          <span class="material-icons">mail</span>
          Messages
        </a>

        <a href="{% url 'notifications' %}" class="nav-item">
          <span class="material-icons">notifications</span>
          Notifications
          {% if notification_count > 0 %}
              <span class="notification-badge">{{ notification_count }}</span>
          {% endif %}
        </a>

      </div>
    </div>

    <!-- Profile -->
    <div class="header-right">
      <a href="{% url 'user_dashboard' %}">
        <span class="material-icons">account_circle</span>
      </a>
    </div>

  </div>
</div>
